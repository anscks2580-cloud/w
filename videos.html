<link rel="stylesheet" href="style.css">
<style>
.page-inner { max-width: 1080px; margin: 0 auto; padding: 80px 48px 96px; }

.page-hero {
  padding: 72px 0 48px;
  border-bottom: 1px solid var(--border-soft);
  margin-bottom: 52px;
}

.breadcrumb {
  font-size: 12px; color: var(--muted);
  margin-bottom: 20px; display: flex; align-items: center; gap: 6px;
}
.breadcrumb a { color: var(--muted); text-decoration: none; }
.breadcrumb a:hover { color: var(--gold); }
.breadcrumb span { color: var(--gold); }

/* ── 필터 ── */
.filter-bar {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 36px;
}

.filter-btn {
  padding: 8px 20px;
  border: 1px solid var(--border-soft);
  border-radius: 100px;
  background: transparent;
  color: var(--muted);
  font-size: 13px; font-family: inherit;
  cursor: pointer; transition: all 0.2s;
}

.filter-btn:hover,
.filter-btn.active {
  background: var(--gold);
  color: var(--bg);
  border-color: var(--gold);
  font-weight: 600;
}

/* ── 영상 그리드 ── */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
}

.video-card {
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
}

.video-card:hover {
  transform: translateY(-4px);
  border-color: rgba(240,192,64,0.4);
}

.video-thumb {
  position: relative;
  padding-bottom: 56.25%;
  background: #0D0920;
  overflow: hidden;
}

.video-thumb img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.3s;
}

.video-card:hover .video-thumb img { transform: scale(1.04); }

.play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(26,18,48,0.45);
  transition: background 0.2s;
}

.video-card:hover .play-overlay { background: rgba(26,18,48,0.25); }

.play-btn {
  width: 52px; height: 52px;
  background: var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}

.video-card:hover .play-btn { transform: scale(1.1); }

.play-icon {
  width: 0; height: 0;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
  border-left: 15px solid var(--bg);
  margin-left: 3px;
}

.video-info { padding: 18px 20px 22px; }

.video-tag {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--gold);
  background: var(--gold-glow);
  padding: 3px 9px; border-radius: 4px;
  margin-bottom: 10px;
}

.video-title {
  font-size: 15px; font-weight: 500;
  line-height: 1.5; margin-bottom: 8px;
}

.video-date { font-size: 12px; color: var(--muted); }

/* ── 모달 ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(13,9,32,0.9);
  align-items: center; justify-content: center;
  padding: 20px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%; max-width: 820px;
  overflow: hidden;
}

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border-soft);
}

.modal-title { font-size: 15px; font-weight: 600; }

.modal-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: none; color: var(--off-white);
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit;
  transition: background 0.2s;
}

.modal-close:hover { background: rgba(255,255,255,0.14); }

.modal-video {
  position: relative; padding-bottom: 56.25%;
  background: #000;
}

.modal-video iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%; border: none;
}

.modal-footer {
  padding: 14px 24px;
  border-top: 1px solid var(--border-soft);
  display: flex; justify-content: flex-end;
}

.modal-yt-link {
  font-size: 13px; color: var(--gold);
  text-decoration: none;
  display: flex; align-items: center; gap: 6px;
}

.modal-yt-link:hover { opacity: 0.8; }

/* 빈 상태 */
.empty-state {
  text-align: center; padding: 80px 20px;
  color: var(--muted); font-size: 15px;
  grid-column: 1/-1;
}

@media (max-width: 768px) {
  .page-inner { padding: 60px 20px 80px; }
  .video-grid { grid-template-columns: 1fr; }
}
</style>

<script>
// ══════════════════════════════════════════════
//  영상 목록 — 여기에 실제 유튜브 영상을 추가하세요
//  youtubeId: 유튜브 URL의 ?v= 뒤 11자리 코드
// ══════════════════════════════════════════════
const videos = [
  { title:"송우찬수학학원 강의", tag:"수학1", youtubeId:"KCWVcK1J_lc", date:"2025.06" },
];

let currentTag = 'all';

function render(tag) {
  const grid = document.getElementById('videoGrid');
  const list = tag === 'all' ? videos : videos.filter(v => v.tag === tag);
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state">해당 카테고리의 강의가 아직 없습니다.</div>';
    return;
  }
  grid.innerHTML = list.map(v => `
    <div class="video-card" onclick="openModal('${v.youtubeId}','${v.title}')">
      <div class="video-thumb">
        <img src="https://img.youtube.com/vi/${v.youtubeId}/mqdefault.jpg" alt="${v.title}" loading="lazy">
        <div class="play-overlay"><div class="play-btn"><div class="play-icon"></div></div></div>
      </div>
      <div class="video-info">
        <span class="video-tag">${v.tag}</span>
        <div class="video-title">${v.title}</div>
        <div class="video-date">${v.date}</div>
      </div>
    </div>
  `).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.tag);
  });
});

render('all');

// 모달
function openModal(id, title) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalIframe').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
  document.getElementById('modalYtLink').href = `https://www.youtube.com/watch?v=${id}`;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalIframe').src = '';
}

function closeOnBg(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
