<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 | 송우찬수학학원</title>
<link rel="stylesheet" href="style.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
.login-wrap { width:100%; max-width:420px; }
.login-card {
  background: linear-gradient(145deg, #231848 0%, #1A1230 100%);
  border:1px solid rgba(240,192,64,0.2);
  border-radius:20px; padding:48px 40px;
  box-shadow: 0 1px 0 rgba(240,192,64,0.5), 0 24px 60px rgba(0,0,0,0.5);
  position:relative; overflow:hidden;
}
.login-card::before {
  content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
  background:linear-gradient(90deg, transparent, rgba(240,192,64,0.8), transparent);
}
.login-logo {
  display:flex; align-items:center; gap:10px;
  justify-content:center; margin-bottom:32px;
}
.login-logo img { height:36px; width:36px; object-fit:contain; }
.login-logo span { font-size:16px; font-weight:700; color:var(--off-white); }
.login-title { text-align:center; font-size:22px; font-weight:700; margin-bottom:6px; letter-spacing:-0.5px; }
.login-sub { text-align:center; font-size:13px; color:var(--muted); margin-bottom:28px; }

/* 탭 */
.login-tabs { display:flex; gap:0; border-bottom:1px solid var(--border-soft); margin-bottom:28px; }
.login-tab {
  flex:1; padding:10px; background:none; border:none;
  font-size:13px; font-weight:600; font-family:inherit;
  color:var(--muted); cursor:pointer; position:relative; transition:color 0.2s;
}
.login-tab::after {
  content:''; position:absolute; bottom:-1px; left:0; right:0;
  height:2px; background:var(--gold);
  transform:scaleX(0); transition:transform 0.2s;
}
.login-tab.active { color:var(--gold); }
.login-tab.active::after { transform:scaleX(1); }
.tab-form { display:none; }
.tab-form.active { display:block; }

.form-group { margin-bottom:16px; }
.form-group label {
  display:block; font-size:11px; color:var(--muted);
  letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; font-weight:500;
}
.form-group input {
  width:100%; padding:13px 16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px; color:var(--off-white); font-size:15px;
  font-family:inherit; transition:border-color 0.2s; outline:none;
}
.form-group input:focus { border-color:rgba(240,192,64,0.5); background:rgba(255,255,255,0.07); }
.form-group input::placeholder { color:rgba(255,255,255,0.2); }

/* 체크박스 옵션 */
.login-options {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:16px;
}

.btn-login {
  width:100%; padding:14px;
  background:var(--gold); color:var(--bg);
  font-size:15px; font-weight:700;
  border:none; border-radius:8px;
  cursor:pointer; font-family:inherit;
  transition:background 0.2s, transform 0.15s;
}
.btn-login:hover { background:#f5cc50; transform:translateY(-1px); }
.btn-login:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

.error-msg {
  display:none; margin-top:12px; padding:12px 16px;
  background:rgba(255,80,80,0.1); border:1px solid rgba(255,80,80,0.3);
  border-radius:8px; font-size:13px; color:#ff9090; text-align:center;
}
/* 비밀번호 변경 섹션 */
.pw-change-wrap {
  margin-top:16px; padding-top:16px;
  border-top:1px solid rgba(255,255,255,0.08);
}
.pw-change-toggle {
  background:none; border:none; padding:0;
  font-size:12px; color:var(--muted); cursor:pointer;
  font-family:inherit; text-decoration:underline;
  transition:color 0.2s;
}
.pw-change-toggle:hover { color:var(--gold); }
.pw-change-body { display:none; }
.pw-change-body.open { display:block; }
.success-msg {
  display:none; margin-top:12px; padding:12px 16px;
  background:rgba(80,200,80,0.1); border:1px solid rgba(80,200,80,0.3);
  border-radius:8px; font-size:13px; color:#90ee90; text-align:center;
}
.login-footer {
  text-align:center; margin-top:24px;
  font-size:12px; color:var(--muted); line-height:1.9;
}
.login-footer a { color:var(--gold); text-decoration:none; }
</style>
</head>

    <div class="login-sub">학생 · 선생님 · 관리자 로그인</div>

    <div class="login-tabs">
      <button class="login-tab active" onclick="switchTab('student',this)">학생</button>
      <button class="login-tab" onclick="switchTab('teacher',this)">선생님</button>
      <button class="login-tab" onclick="switchTab('admin',this)">관리자</button>
    </div>

    <!-- 학생 탭 -->
    <div class="tab-form active" id="form-student">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="s-name" placeholder="" autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:6px;">
        <label>비밀번호</label>
        <input type="password" id="s-pw" placeholder="" autocomplete="current-password">
      </div>

      <!-- 비밀번호 변경 토글 (비밀번호 입력 바로 아래) -->
      <div style="text-align:right;margin-bottom:16px;">
        <button class="pw-change-toggle" onclick="togglePwChange()">🔑 비밀번호 변경</button>
      </div>

      <button class="btn-login" id="s-btn" onclick="loginStudent()">로그인</button>
      <div class="error-msg" id="s-err"></div>

      <!-- 비밀번호 변경 폼 (로그인 버튼 아래 펼쳐짐) -->
      <div class="pw-change-wrap">
        <div class="pw-change-body" id="pw-change-body">
          <div style="font-size:12px;color:var(--gold);font-weight:600;margin-bottom:12px;padding-top:4px;">🔑 비밀번호 변경</div>
          <div class="form-group">
            <label>아이디 (이름)</label>
            <input type="text" id="pc-name" placeholder="이름 입력" autocomplete="off">
          </div>
          <div class="form-group">
            <label>현재 비밀번호 (전화번호)</label>
            <input type="password" id="pc-cur" placeholder="현재 비밀번호" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label>새 비밀번호</label>
            <input type="password" id="pc-new" placeholder="새 비밀번호 (6자 이상)" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label>새 비밀번호 확인</label>
            <input type="password" id="pc-new2" placeholder="새 비밀번호 재입력" autocomplete="new-password">
          </div>
          <button class="btn-login" id="pc-btn" onclick="changePassword()" style="background:rgba(240,192,64,0.15);color:var(--gold);border:1px solid rgba(240,192,64,0.4);">비밀번호 변경</button>
          <div class="error-msg"   id="pc-err"></div>
          <div class="success-msg" id="pc-ok">✅ 비밀번호가 변경되었습니다. 새 비밀번호로 로그인해 주세요.</div>
        </div>
      </div>
    </div>

    <!-- 선생님 탭 -->
    <div class="tab-form" id="form-teacher">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="t-name" placeholder="" autocomplete="username">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="t-pw" placeholder="" autocomplete="current-password">
      </div>
      <div class="login-options">

        <span></span>
      </div>
      <button class="btn-login" id="t-btn" onclick="loginTeacher()">선생님 로그인</button>
      <div class="error-msg" id="t-err"></div>
    </div>

    <!-- 관리자 탭 -->
    <div class="tab-form" id="form-admin">
      <div class="form-group">
        <label>아이디</label>
        <input type="email" id="a-email" placeholder="" autocomplete="username">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="a-pw" placeholder="" autocomplete="current-password">
      </div>
      <div class="login-options">

        <span></span>
      </div>
      <button class="btn-login" id="a-btn" onclick="loginAdmin()">관리자 로그인</button>
      <div class="error-msg" id="a-err"></div>
    </div>

    <div class="login-footer">
      로그인 문의: 평촌관 <a href="tel:031-386-8899">031-386-8899</a><br>
      <a href="index.html">← 홈으로 돌아가기</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, reauthenticateWithCredential, EmailAuthProvider, updatePassword, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyD_eYNKzfa-aT41E3Dqt_HyJc6UeSR5ErA",
  authDomain: "songmath.firebaseapp.com",
  projectId: "songmath",
  storageBucket: "songmath.firebasestorage.app",
  messagingSenderId: "936295436575",
  appId: "1:936295436575:web:d1e201508719850cfbe02a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 저장된 아이디 불러오기
const savedId = localStorage.getItem('swc_saved_id');
if (savedId) {
  document.getElementById('s-name').value = savedId;
}

// 탭 전환
window.switchTab = function(id, btn) {
  document.querySelectorAll('.login-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-form').forEach(f => f.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('form-' + id).classList.add('active');
};

// 학생 로그인
window.loginStudent = async function() {
  const name = document.getElementById('s-name').value.trim();
  const pw = document.getElementById('s-pw').value.trim().replace(/-/g,'');
  const btn = document.getElementById('s-btn');
  const err = document.getElementById('s-err');

  if (!name || !pw) { showErr('s-err','아이디와 비밀번호를 입력해주세요.'); return; }

  btn.disabled = true; btn.textContent = '로그인 중...';
  err.style.display = 'none';

  localStorage.removeItem('swc_saved_id');

  try {
    await setPersistence(auth, browserSessionPersistence);
    const cred = await signInWithEmailAndPassword(auth, name + '@songmath.kr', pw);
    // students 컬렉션에 있는지 확인
    const studentDoc = await getDoc(doc(db, 'students', cred.user.uid));
    if (!studentDoc.exists()) {
      showErr('s-err','학생 계정이 아닙니다. 원장님께 문의해주세요.');
      await auth.signOut();
      btn.disabled = false; btn.textContent = '로그인';
      return;
    }
    window.location.href = 'videos.html';
  } catch(e) {
    showErr('s-err','아이디 또는 비밀번호가 올바르지 않습니다.');
    btn.disabled = false; btn.textContent = '로그인';
  }
};

// 선생님 로그인
window.loginTeacher = async function() {
  const name = document.getElementById('t-name').value.trim();
  const pw   = document.getElementById('t-pw').value;
  const btn  = document.getElementById('t-btn');

  if (!name || !pw) { showErr('t-err', '이름과 비밀번호를 입력해주세요.'); return; }

  btn.disabled = true; btn.textContent = '로그인 중...';

  const persistence = browserSessionPersistence;

  try {
    await setPersistence(auth, persistence);
    const cred = await signInWithEmailAndPassword(auth, name + '@songmath.kr', pw);
    const teacherDoc = await getDoc(doc(db, 'teachers', cred.user.uid));
    if (!teacherDoc.exists()) {
      showErr('t-err', '선생님 계정이 아닙니다. 원장님께 문의해주세요.');
      btn.disabled = false; btn.textContent = '선생님 로그인';
      return;
    }
    window.location.href = 'teacher.html';
  } catch(e) {
    showErr('t-err', '이름 또는 비밀번호가 올바르지 않습니다.');
    btn.disabled = false; btn.textContent = '선생님 로그인';
  }
};

// 관리자 로그인
window.loginAdmin = async function() {
  const email = document.getElementById('a-email').value.trim();
  const pw = document.getElementById('a-pw').value;
  const btn = document.getElementById('a-btn');

  if (!email || !pw) { showErr('a-err','이메일과 비밀번호를 입력해주세요.'); return; }

  btn.disabled = true; btn.textContent = '로그인 중...';

  const persistence = browserSessionPersistence;

  try {
    await setPersistence(auth, persistence);
    const cred = await signInWithEmailAndPassword(auth, email, pw);
    const adminDoc = await getDoc(doc(db, 'admins', cred.user.uid));
    if (!adminDoc.exists()) {
      showErr('a-err','관리자 권한이 없습니다.');
      btn.disabled = false; btn.textContent = '관리자 로그인';
      return;
    }
    window.location.href = 'admin.html';
  } catch(e) {
    showErr('a-err','이메일 또는 비밀번호가 올바르지 않습니다.');
    btn.disabled = false; btn.textContent = '관리자 로그인';
  }
};

// 비밀번호 변경 토글
window.togglePwChange = function() {
  const body = document.getElementById('pw-change-body');
  body.classList.toggle('open');
};

// 비밀번호 변경
window.changePassword = async function() {
  const name   = document.getElementById('pc-name').value.trim();
  const curPw  = document.getElementById('pc-cur').value.trim().replace(/-/g,'');
  const newPw  = document.getElementById('pc-new').value;
  const newPw2 = document.getElementById('pc-new2').value;
  const btn    = document.getElementById('pc-btn');
  const errEl  = document.getElementById('pc-err');
  const okEl   = document.getElementById('pc-ok');

  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (!name || !curPw || !newPw || !newPw2) {
    showErr('pc-err', '모든 항목을 입력해주세요.'); return;
  }
  if (newPw.length < 6) {
    showErr('pc-err', '새 비밀번호는 6자 이상이어야 합니다.'); return;
  }
  if (newPw !== newPw2) {
    showErr('pc-err', '새 비밀번호가 일치하지 않습니다.'); return;
  }

  btn.disabled = true; btn.textContent = '변경 중...';

  try {
    // 1) 현재 비밀번호로 재인증
    const email = name + '@songmath.kr';
    const cred = await signInWithEmailAndPassword(auth, email, curPw);
    const credential = EmailAuthProvider.credential(email, curPw);
    await reauthenticateWithCredential(cred.user, credential);
    // 2) 새 비밀번호로 변경
    await updatePassword(cred.user, newPw);
    okEl.style.display = 'block';
    // 입력 초기화
    ['pc-name','pc-cur','pc-new','pc-new2'].forEach(id => document.getElementById(id).value = '');
  } catch(e) {
    const msg = e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential'
      ? '현재 비밀번호가 올바르지 않습니다.'
      : e.code === 'auth/user-not-found'
      ? '아이디를 확인해주세요.'
      : '오류가 발생했습니다: ' + e.message;
    showErr('pc-err', msg);
  } finally {
    btn.disabled = false; btn.textContent = '비밀번호 변경';
  }
};

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}

// 엔터키
document.getElementById('s-name').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('s-pw').focus(); });
document.getElementById('s-pw').addEventListener('keydown', e => { if(e.key==='Enter') loginStudent(); });
document.getElementById('t-name').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('t-pw').focus(); });
document.getElementById('t-pw').addEventListener('keydown', e => { if(e.key==='Enter') loginTeacher(); });
document.getElementById('a-pw').addEventListener('keydown', e => { if(e.key==='Enter') loginAdmin(); });
</script>
</body>
