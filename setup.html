<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 설정</title>
<link rel="stylesheet" href="style.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
.setup-card {
  background: var(--bg-card); border:1px solid var(--border-soft);
  border-radius:16px; padding:48px 40px; width:100%; max-width:420px;
}
.setup-card h2 { font-size:20px; font-weight:700; margin-bottom:8px; }
.setup-card p { font-size:13px; color:var(--muted); margin-bottom:28px; line-height:1.7; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:7px; }
.form-group input {
  width:100%; padding:11px 14px;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
  border-radius:8px; color:var(--off-white); font-size:14px; font-family:inherit; outline:none;
}
.form-group input:focus { border-color:rgba(240,192,64,0.5); }
.btn-setup {
  width:100%; padding:13px; background:var(--gold); color:var(--bg);
  font-size:14px; font-weight:700; border:none; border-radius:8px;
  cursor:pointer; font-family:inherit;
}
.result { margin-top:14px; padding:12px; border-radius:8px; font-size:13px; display:none; }
.result.ok { background:rgba(80,200,80,0.1); color:#90ff90; border:1px solid rgba(80,200,80,0.3); }
.result.err { background:rgba(255,80,80,0.1); color:#ff9090; border:1px solid rgba(255,80,80,0.3); }
</style>
</head>
<body>
<div class="setup-card">
  <h2>🔧 관리자 계정 최초 설정</h2>
  <p>이 페이지는 관리자 계정을 처음 만들 때 한 번만 사용합니다.<br>완료 후 이 파일을 GitHub에서 삭제해 주세요.</p>
  <div class="form-group">
    <label>관리자 이메일</label>
    <input type="email" id="adminEmail" placeholder="예: admin@songmath.kr">
  </div>
  <div class="form-group">
    <label>비밀번호 (8자리 이상)</label>
    <input type="password" id="adminPw" placeholder="관리자 비밀번호">
  </div>
  <button class="btn-setup" onclick="createAdmin()">관리자 계정 생성</button>
  <div class="result" id="result"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyD_eYNKzfa-aT41E3Dqt_HyJc6UeSR5ErA",
  authDomain: "songmath.firebaseapp.com",
  projectId: "songmath",
  storageBucket: "songmath.firebasestorage.app",
  messagingSenderId: "936295436575",
  appId: "1:936295436575:web:d1e201508719850cfbe02a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.createAdmin = async function() {
  const email = document.getElementById('adminEmail').value.trim();
  const pw = document.getElementById('adminPw').value;
  const res = document.getElementById('result');

  if (!email || !pw) {
    res.textContent = '이메일과 비밀번호를 입력해주세요.';
    res.className = 'result err'; res.style.display = 'block'; return;
  }

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await setDoc(doc(db, 'admins', cred.user.uid), {
      email, createdAt: new Date().toISOString()
    });
    res.innerHTML = '✅ 관리자 계정 생성 완료!<br>이제 이 파일(setup.html)을 GitHub에서 삭제하세요.<br><a href="login.html" style="color:var(--gold);">로그인 페이지로 이동 →</a>';
    res.className = 'result ok'; res.style.display = 'block';
  } catch(e) {
    res.textContent = '오류: ' + e.message;
    res.className = 'result err'; res.style.display = 'block';
  }
};
</script>
</body>
</html>
