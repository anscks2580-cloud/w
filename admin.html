<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | 송우찬수학학원</title>
<link rel="stylesheet" href="style.css">
<style>
.admin-wrap { max-width:900px; margin:0 auto; padding:80px 24px 96px; }
.admin-header { margin-bottom:48px; }
.admin-header h1 { font-size:28px; font-weight:700; margin-bottom:8px; }
.admin-header p { font-size:14px; color:var(--muted); }

/* 탭 */
.admin-tabs { display:flex; gap:0; border-bottom:2px solid var(--border-soft); margin-bottom:36px; }
.admin-tab {
  padding:12px 28px; background:none; border:none;
  font-size:14px; font-weight:600; font-family:inherit;
  color:var(--muted); cursor:pointer; position:relative;
  transition:color 0.2s;
}
.admin-tab::after {
  content:''; position:absolute; bottom:-2px; left:0; right:0;
  height:2px; background:var(--gold);
  transform:scaleX(0); transition:transform 0.2s;
}
.admin-tab.active { color:var(--gold); }
.admin-tab.active::after { transform:scaleX(1); }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* 카드 */
.card {
  background:var(--bg-card); border:1px solid var(--border-soft);
  border-radius:14px; padding:28px; margin-bottom:20px;
}
.card h3 { font-size:16px; font-weight:600; margin-bottom:20px; color:var(--gold); }

/* 폼 */
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group label { font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.form-group input, .form-group select {
  padding:10px 14px; background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1); border-radius:8px;
  color:var(--off-white); font-size:14px; font-family:inherit; outline:none;
  transition:border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color:rgba(240,192,64,0.5); }
.form-group select option { background:#1A1230; }

.btn { 
  padding:10px 20px; border:none; border-radius:8px;
  font-size:13px; font-weight:600; font-family:inherit;
  cursor:pointer; transition:all 0.2s;
}
.btn-primary { background:var(--gold); color:var(--bg); }
.btn-primary:hover { background:#f5cc50; }
.btn-danger { background:rgba(255,80,80,0.15); color:#ff9090; border:1px solid rgba(255,80,80,0.3); }
.btn-danger:hover { background:rgba(255,80,80,0.25); }
.btn-sm { padding:6px 14px; font-size:12px; }

/* 학생 목록 */
.student-list { display:flex; flex-direction:column; gap:12px; }
.student-item {
  display:flex; align-items:center; gap:16px;
  padding:16px 20px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border-soft); border-radius:10px;
}
.student-name { font-weight:600; font-size:15px; flex:1; }
.student-grade { font-size:12px; color:var(--gold); background:rgba(240,192,64,0.1); padding:3px 10px; border-radius:100px; }
.student-actions { display:flex; gap:8px; }

/* 영상 배정 */
.assign-list { display:flex; flex-direction:column; gap:10px; }
.assign-item {
  display:flex; align-items:center; gap:14px;
  padding:14px 16px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border-soft); border-radius:8px;
}
.assign-item input[type=checkbox] { width:16px; height:16px; accent-color:var(--gold); cursor:pointer; }
.assign-title { flex:1; font-size:14px; }
.assign-tag { font-size:11px; color:var(--gold); background:rgba(240,192,64,0.1); padding:2px 8px; border-radius:4px; }

.msg { padding:10px 14px; border-radius:8px; font-size:13px; margin-top:12px; display:none; }
.msg.success { background:rgba(80,200,80,0.1); color:#90ff90; border:1px solid rgba(80,200,80,0.3); }
.msg.error { background:rgba(255,80,80,0.1); color:#ff9090; border:1px solid rgba(255,80,80,0.3); }

.loading { text-align:center; padding:40px; color:var(--muted); }

@media(max-width:768px) {
  .form-row { grid-template-columns:1fr; }
  .student-item { flex-wrap:wrap; }
}
</style>
</head>

<div class="admin-wrap" style="padding-top:100px;">
  <div class="admin-header">
    <h1>👨‍💼 관리자 페이지</h1>
    <p>학생 계정 관리 및 강의 배정을 담당합니다.</p>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('students', this)">학생 관리</button>
    <button class="admin-tab" onclick="switchTab('assign', this)">강의 배정</button>
    <button class="admin-tab" onclick="switchTab('videos', this)">강의 목록 관리</button>
  </div>

  <!-- 학생 관리 탭 -->
  <div class="tab-panel active" id="tab-students">
    <div class="card">
      <h3>+ 신규 학생 등록</h3>
      <div class="form-row">
        <div class="form-group">
          <label>학생 이름 (아이디)</label>
          <input type="text" id="newName" placeholder="예: 홍길동">
        </div>
        <div class="form-group">
          <label>전화번호 (비밀번호)</label>
          <input type="text" id="newPhone" placeholder="예: 01012345678">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>학년</label>
          <select id="newGrade">
            <option value="중1">중1</option>
            <option value="중2">중2</option>
            <option value="중3">중3</option>
            <option value="고1">고1</option>
            <option value="고2">고2</option>
            <option value="고3">고3</option>
            <option value="N수">N수</option>
          </select>
        </div>
        <div class="form-group">
          <label>관할</label>
          <select id="newBranch">
            <option value="평촌관">평촌관</option>
            <option value="산본관">산본관</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="createStudent()">학생 등록</button>
      <div class="msg" id="createMsg"></div>
    </div>

    <div class="card">
      <h3>📋 등록된 학생 목록</h3>
      <div class="student-list" id="studentList">
        <div class="loading">불러오는 중...</div>
      </div>
    </div>
  </div>

  <!-- 강의 배정 탭 -->
  <div class="tab-panel" id="tab-assign">
    <div class="card">
      <h3>🎬 학생별 강의 배정</h3>
      <div class="form-group" style="margin-bottom:20px;">
        <label>학생 선택</label>
        <select id="assignStudent" onchange="loadStudentVideos()">
          <option value="">학생을 선택하세요</option>
        </select>
      </div>
      <div id="assignVideoList">
        <div style="color:var(--muted);font-size:14px;">학생을 먼저 선택해주세요.</div>
      </div>
      <button class="btn btn-primary" style="margin-top:16px;" onclick="saveAssign()">배정 저장</button>
      <div class="msg" id="assignMsg"></div>
    </div>
  </div>

  <!-- 강의 목록 관리 탭 -->
  <div class="tab-panel" id="tab-videos">
    <div class="card">
      <h3>+ 강의 추가</h3>
      <div class="form-row">
        <div class="form-group">
          <label>강의 제목</label>
          <input type="text" id="vTitle" placeholder="예: 수열의 극한 개념 완전정복">
        </div>
        <div class="form-group">
          <label>유튜브 ID</label>
          <input type="text" id="vYtId" placeholder="예: dQw4w9WgXcQ">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>카테고리</label>
          <select id="vTag">
            <option value="수학1">수학Ⅰ</option>
            <option value="수학2">수학Ⅱ</option>
            <option value="미적분">미적분</option>
            <option value="확통">확률과 통계</option>
            <option value="논술">수리논술</option>
            <option value="중등">중등수학</option>
            <option value="내신">내신대비</option>
          </select>
        </div>
        <div class="form-group">
          <label>날짜</label>
          <input type="text" id="vDate" placeholder="예: 2025.06">
        </div>
      </div>
      <button class="btn btn-primary" onclick="addVideo()">강의 추가</button>
      <div class="msg" id="videoMsg"></div>
    </div>

    <div class="card">
      <h3>📹 전체 강의 목록</h3>
      <div id="videoAdminList"><div class="loading">불러오는 중...</div></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyD_eYNKzfa-aT41E3Dqt_HyJc6UeSR5ErA",
  authDomain: "songmath.firebaseapp.com",
  projectId: "songmath",
  storageBucket: "songmath.firebasestorage.app",
  messagingSenderId: "936295436575",
  appId: "1:936295436575:web:d1e201508719850cfbe02a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 관리자 확인
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'login.html'; return; }
  const adminDoc = await getDoc(doc(db, 'admins', user.uid));
  if (!adminDoc.exists()) { window.location.href = 'index.html'; return; }
  document.getElementById('adminEmail').textContent = user.email;
  loadStudents();
  loadAllVideos();
});

// 탭 전환
window.switchTab = function(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
};

// 로그아웃
window.doLogout = async function() {
  await signOut(auth);
  window.location.href = 'login.html';
};

// ── 학생 관리 ──
let studentsCache = [];

async function loadStudents() {
  const snap = await getDocs(collection(db, 'students'));
  studentsCache = [];
  snap.forEach(d => studentsCache.push({id: d.id, ...d.data()}));
  renderStudents();
  renderAssignSelect();
}

function renderStudents() {
  const el = document.getElementById('studentList');
  if (!studentsCache.length) { el.innerHTML = '<div style="color:var(--muted);font-size:14px;">등록된 학생이 없습니다.</div>'; return; }
  el.innerHTML = studentsCache.map(s => `
    <div class="student-item">
      <div class="student-name">${s.name}</div>
      <span class="student-grade">${s.grade}</span>
      <span style="font-size:12px;color:var(--muted);">${s.branch}</span>
      <div class="student-actions">
        <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}', '${s.name}')">삭제</button>
      </div>
    </div>
  `).join('');
}

function renderAssignSelect() {
  const sel = document.getElementById('assignStudent');
  sel.innerHTML = '<option value="">학생을 선택하세요</option>' +
    studentsCache.map(s => `<option value="${s.id}">${s.name} (${s.grade} / ${s.branch})</option>`).join('');
}

window.createStudent = async function() {
  const name = document.getElementById('newName').value.trim();
  const phone = document.getElementById('newPhone').value.trim().replace(/-/g,'');
  const grade = document.getElementById('newGrade').value;
  const branch = document.getElementById('newBranch').value;
  if (!name || !phone) { showMsg('createMsg','이름과 전화번호를 입력해주세요.','error'); return; }

  try {
    const email = name + '@songmath.kr';
    const cred = await createUserWithEmailAndPassword(auth, email, phone);
    await setDoc(doc(db, 'students', cred.user.uid), {
      name, phone, grade, branch,
      assignedVideos: [],
      createdAt: new Date().toISOString()
    });
    showMsg('createMsg', `${name} 학생 등록 완료!`, 'success');
    document.getElementById('newName').value = '';
    document.getElementById('newPhone').value = '';
    loadStudents();
  } catch(e) {
    showMsg('createMsg', '오류: ' + (e.code === 'auth/email-already-in-use' ? '이미 등록된 학생입니다.' : e.message), 'error');
  }
};

window.deleteStudent = async function(uid, name) {
  if (!confirm(`${name} 학생을 삭제하시겠습니까?`)) return;
  await deleteDoc(doc(db, 'students', uid));
  showMsg('createMsg', `${name} 학생 삭제 완료`, 'success');
  loadStudents();
};

// ── 강의 배정 ──
let allVideosCache = [];

window.loadStudentVideos = async function() {
  const uid = document.getElementById('assignStudent').value;
  if (!uid) return;
  const studentDoc = await getDoc(doc(db, 'students', uid));
  const assigned = studentDoc.data()?.assignedVideos || [];
  const el = document.getElementById('assignVideoList');
  if (!allVideosCache.length) { el.innerHTML = '<div style="color:var(--muted);">강의 목록을 먼저 추가해주세요.</div>'; return; }
  el.innerHTML = '<div class="assign-list">' + allVideosCache.map(v => `
    <div class="assign-item">
      <input type="checkbox" id="v_${v.id}" value="${v.id}" ${assigned.includes(v.id) ? 'checked' : ''}>
      <label for="v_${v.id}" class="assign-title">${v.title}</label>
      <span class="assign-tag">${v.tag}</span>
    </div>
  `).join('') + '</div>';
};

window.saveAssign = async function() {
  const uid = document.getElementById('assignStudent').value;
  if (!uid) { showMsg('assignMsg','학생을 먼저 선택해주세요.','error'); return; }
  const checked = [...document.querySelectorAll('#assignVideoList input:checked')].map(i => i.value);
  await updateDoc(doc(db, 'students', uid), { assignedVideos: checked });
  showMsg('assignMsg', '강의 배정 저장 완료!', 'success');
};

// ── 강의 목록 ──
async function loadAllVideos() {
  const snap = await getDocs(collection(db, 'videos'));
  allVideosCache = [];
  snap.forEach(d => allVideosCache.push({id: d.id, ...d.data()}));
  renderVideoAdminList();
}

function renderVideoAdminList() {
  const el = document.getElementById('videoAdminList');
  if (!allVideosCache.length) { el.innerHTML = '<div style="color:var(--muted);font-size:14px;">등록된 강의가 없습니다.</div>'; return; }
  el.innerHTML = allVideosCache.map(v => `
    <div class="assign-item" style="margin-bottom:8px;">
      <span class="assign-tag">${v.tag}</span>
      <span class="assign-title">${v.title}</span>
      <span style="font-size:12px;color:var(--muted);">${v.date}</span>
      <button class="btn btn-danger btn-sm" onclick="deleteVideo('${v.id}')">삭제</button>
    </div>
  `).join('');
}

window.addVideo = async function() {
  const title = document.getElementById('vTitle').value.trim();
  const youtubeId = document.getElementById('vYtId').value.trim();
  const tag = document.getElementById('vTag').value;
  const date = document.getElementById('vDate').value.trim();
  if (!title || !youtubeId) { showMsg('videoMsg','제목과 유튜브 ID를 입력해주세요.','error'); return; }
  const id = Date.now().toString();
  await setDoc(doc(db, 'videos', id), { title, youtubeId, tag, date, createdAt: new Date().toISOString() });
  showMsg('videoMsg','강의 추가 완료!','success');
  document.getElementById('vTitle').value='';
  document.getElementById('vYtId').value='';
  loadAllVideos();
};

window.deleteVideo = async function(id) {
  if (!confirm('강의를 삭제하시겠습니까?')) return;
  await deleteDoc(doc(db, 'videos', id));
  showMsg('videoMsg','삭제 완료','success');
  loadAllVideos();
};

// 공통 메시지
function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'msg ' + type; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}
</script>
</body>
</html>
