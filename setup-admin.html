<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 계정 설정</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0a1e; color: #f0edf8; font-family: 'Pretendard', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.wrap { width: 100%; max-width: 400px; padding: 24px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #f0c040; }
p { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 28px; line-height: 1.6; }
.group { margin-bottom: 16px; }
label { display: block; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
input { width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #f0edf8; font-size: 14px; outline: none; }
input:focus { border-color: rgba(240,192,64,0.5); }
button { width: 100%; padding: 13px; background: #f0c040; color: #0f0a1e; font-size: 14px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; margin-top: 8px; }
button:hover { background: #f5cc50; }
.msg { margin-top: 14px; padding: 12px 14px; border-radius: 8px; font-size: 13px; display: none; }
.msg.success { background: rgba(80,200,80,0.1); color: #90ff90; border: 1px solid rgba(80,200,80,0.3); }
.msg.error { background: rgba(255,80,80,0.1); color: #ff9090; border: 1px solid rgba(255,80,80,0.3); }
</style>
</head>
<body>
<div class="wrap">
  <h1>🔐 관리자 계정 설정</h1>
  <p>관리자 계정을 새로 등록합니다.<br>등록 완료 후 이 파일은 삭제해주세요.</p>
  <div class="group">
    <label>이메일</label>
    <input type="email" id="email" placeholder="smc1823@nate.com">
  </div>
  <div class="group">
    <label>비밀번호</label>
    <input type="password" id="pw" placeholder="8자리 이상">
  </div>
  <button onclick="registerAdmin()">관리자 등록</button>
  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_eYNKzfa-aT41E3Dqt_HyJc6UeSR5ErA",
  authDomain: "songmath.firebaseapp.com",
  projectId: "songmath",
  storageBucket: "songmath.firebasestorage.app",
  messagingSenderId: "936295436575",
  appId: "1:936295436575:web:d1e201508719850cfbe02a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

window.registerAdmin = async () => {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('pw').value;
  if (!email || !pw) { showMsg('이메일과 비밀번호를 입력해주세요.', 'error'); return; }
  if (pw.length < 8) { showMsg('비밀번호는 8자리 이상이어야 합니다.', 'error'); return; }

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await setDoc(doc(db, 'admins', cred.user.uid), {
      email,
      createdAt: new Date().toISOString()
    });
    showMsg(`✅ 관리자 등록 완료! 이제 admin.html에서 로그인하세요.`, 'success');
  } catch(e) {
    const map = {
      'auth/email-already-in-use': '이미 존재하는 이메일입니다. Firestore admins 컬렉션에 수동으로 문서를 추가해주세요.',
      'auth/invalid-email': '이메일 형식이 올바르지 않습니다.',
      'auth/weak-password': '비밀번호가 너무 짧습니다.',
    };
    showMsg(map[e.code] || '오류: ' + e.message, 'error');
  }
};
</script>
</body>
</html>
